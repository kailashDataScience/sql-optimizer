services:
  - type: web
    name: querylens-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: MYSQL_URL
        sync: false
